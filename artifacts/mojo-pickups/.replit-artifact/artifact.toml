kind = "web"
previewPath = "/"
title = "Mojo Pickups"
version = "1.0.0"
id = "artifacts/mojo-pickups"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21982

[services.development]
run = "pnpm --filter @workspace/mojo-pickups run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mojo-pickups", "run", "build" ]
publicDir = "artifacts/mojo-pickups/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21982"
BASE_PATH = "/"
